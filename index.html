<!-- ============================================================
  ✏️  ÁREA DE CONFIGURAÇÃO – EDITE AQUI OS PRÊMIOS

  CAMPOS DE CADA PRÊMIO:
  · name      → Texto curto na fatia da roleta (use \n para quebra de linha)
  · label     → Título no modal de resultado
  · detail    → Descrição do prêmio no modal
  · icon      → Emoji que aparece no modal
  · tag       → Etiqueta colorida (ex: "JET", "Nubank", "Vivo")
  · tagColor  → Cor da etiqueta (#hex)
  · win       → true = prêmio real | false = "tente novamente"
  · weight    → Probabilidade (maior número = mais chance de sair)
  · sliceColor→ Cor da fatia na roda
  · ctaLabel  → Texto do botão no modal
  · ctaAction → Ação ao clicar no botão

  PARA ADICIONAR: copie um bloco { ... } e ajuste.
  PARA REMOVER: apague o bloco inteiro.
  A roleta se ajusta sozinha ao número de prêmios.
============================================================ -->

  :root {

  body {

    flex-shrink: 0;

  /* ── HERO ── */

    width: 100%; max-width: 430px;
    text-align: center;
    padding: 14px 18px 0;
    position: relative; z-index: 10;
  }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(21,101,192,0.18);
    border: 1px solid rgba(66,165,245,0.25);
    color: var(--accent);
    font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
    padding: 4px 13px; border-radius: 30px;

  .hero h1 {

  /* ── WHEEL SECTION ── */

    padding: 10px 18px 0;
    position: relative; z-index: 10;
  }

  /* Plataforma de cassino */
  .wheel-platform {
    position: relative;
    --wsize: min(310px, calc(100vw - 40px));
    width: calc(var(--wsize) + 28px);
    height: calc(var(--wsize) + 28px);
    display: flex; align-items: center; justify-content: center;
  }

  /* Glow externo */
  .wheel-platform::before {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, transparent 55%, rgba(21,101,192,0.4) 100%);
    animation: platformGlow 3s ease-in-out infinite alternate;
    pointer-events: none; z-index: 0;
  }
  @keyframes platformGlow { from{opacity:.5} to{opacity:1} }

  /* Aro dourado externo — estilo cassino */
  .wheel-rim {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      #7A6000 0deg, #FFE566 15deg, #C8A000 30deg, #FFE566 45deg,
      #7A6000 60deg, #FFE566 75deg, #C8A000 90deg, #FFE566 105deg,
      #7A6000 120deg, #FFE566 135deg, #C8A000 150deg, #FFE566 165deg,
      #7A6000 180deg, #FFE566 195deg, #C8A000 210deg, #FFE566 225deg,
      #7A6000 240deg, #FFE566 255deg, #C8A000 270deg, #FFE566 285deg,
      #7A6000 300deg, #FFE566 315deg, #C8A000 330deg, #FFE566 345deg, #7A6000 360deg
    );
    box-shadow: 0 0 0 2px #4A3800, 0 0 35px rgba(200,160,0,0.5), 0 0 70px rgba(21,101,192,0.25);
    z-index: 1;
  }

  /* Roda interna com fatias */
  .wheel-outer {
    position: absolute;
    width: var(--wsize); height: var(--wsize);
    border-radius: 50%;
    border: 4px solid #C8A000;
    box-shadow: 0 0 0 2px #4A3800, inset 0 0 40px rgba(0,0,0,0.65);
    z-index: 2;
  }

  /* Ponteiro estilo cassino */
  .pointer-wrap {
    position: absolute;
    top: 2px; left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    display: flex; flex-direction: column; align-items: center;
    filter: drop-shadow(0 2px 8px rgba(200,160,0,0.8));
  }
  .pointer-stem {
    width: 5px; height: 16px;
    background: linear-gradient(to bottom, #FFE566, #C8A000);
    border-radius: 3px 3px 0 0;
  }
  .pointer-head {
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 16px solid #FFE566;
  }

  /* Hub central giratório */
  .wheel-center {
    position: absolute;
    width: 14%; aspect-ratio: 1;
    background: radial-gradient(circle at 35% 35%,
      #fff 0%, #B3D4FF 35%, #1565C0 65%, #0D47A1 100%);
    border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    border: 3px solid #FFE566;
    box-shadow: 0 0 0 1px #C8A000, 0 0 20px rgba(66,165,245,0.9), 0 0 35px rgba(200,160,0,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(0.8rem, 3vw, 1.2rem); z-index: 15;
    animation: hubSpin 8s linear infinite;
  }
  @keyframes hubSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── SPIN BUTTON ── */
  .spin-btn {
    margin-top: 16px;
    width: 100%; max-width: min(310px, calc(100vw - 40px));
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px; color: #fff;
    background: linear-gradient(135deg, var(--blue-mid), var(--blue));
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 24px rgba(21,101,192,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.15s ease;
    position: relative; overflow: hidden;
    -webkit-appearance: none;
  }
  .spin-btn::after {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transition: left 0.45s;
  }
  .spin-btn:hover::after { left: 100%; }
  .spin-btn:active { transform: scale(0.97); opacity: 0.9; }
  .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .spins-info {
    font-size: 0.74rem; color: var(--muted); margin-top: 8px; text-align: center;
  }
  .spins-info strong { color: var(--blue-light); }

  .prizes-section {

  .modal-overlay {

  @keyframes slideUp {
    from { transform: translateY(70px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .modal::before {
    content: ''; position: absolute; top: 10px; left: 50%;

  .modal-icon {
    font-size: 3.4rem; margin-bottom: 8px; display: block;

  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); } to { transform: scale(1) rotate(0); }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.85rem; letter-spacing: 3px; margin-bottom: 4px;

  .modal-title.win  { color: var(--blue-light); text-shadow: 0 0 18px rgba(66,165,245,0.4); }
  .modal-title.lose { color: var(--muted); }

  .modal-prize { font-size: 1.15rem; font-weight: 900; color: var(--white); margin-bottom: 7px; }

  .modal-detail { font-size: 0.83rem; color: var(--muted); line-height: 1.55; margin-bottom: 20px; }

  .modal-btn {
    width: 100%; padding: 15px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 2px; color: #fff;
    background: linear-gradient(135deg, var(--blue-mid), var(--blue));
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 4px 18px rgba(21,101,192,0.4);
    transition: opacity 0.15s; -webkit-appearance: none;
  }
  .modal-btn:active { opacity: 0.85; transform: scale(0.98); }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--bg3); border: 1px solid var(--bg4);
    color: var(--muted); width: 30px; height: 30px; border-radius: 50%;

  /* ── CONFETTI ── */

  @keyframes confettiFall { to { transform: translateY(110vh) rotate(800deg); opacity: 0; } }
</style>

      <div class="prize-card-name">${p.label}</div>
      ${p.tag ? `<span class="prize-card-tag" style="background:${p.tagColor}">${p.tag}</span>` : ''}
    </div>`;
  document.getElementById('prizesGrid').appendChild(card);
});

// ════════════════════════════════════════════════════════
//  CANVAS ROLETA
// ════════════════════════════════════════════════════════
const wheelEl = document.getElementById('wheel');
const canvas  = document.createElement('canvas');
canvas.style.cssText = 'position:absolute;top:0;left:0;border-radius:50%;';
wheelEl.insertBefore(canvas, wheelEl.firstChild);

function drawWheel(rotation = 0) {
  const size = wheelEl.offsetWidth || Math.min(310, window.innerWidth - 40);
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx  = size / 2, cy = size / 2;
  const rOuter = size / 2 - 1;
  const rInner = rOuter * 0.14; // hub radius
  const totalW = PRIZES.reduce((s, p) => s + p.weight, 0);

  ctx.clearRect(0, 0, size, size);

  // ── 1. FATIAS ────────────────────────────────────────
  let angle = rotation - Math.PI / 2;
  PRIZES.forEach((p, idx) => {
    const slice = (p.weight / totalW) * 2 * Math.PI;
    const mid   = angle + slice / 2;

    // Gradiente radial por fatia
    const grd = ctx.createRadialGradient(cx, cy, rInner, cx, cy, rOuter);
    grd.addColorStop(0,   lighten(p.sliceColor, 30));
    grd.addColorStop(0.5, p.sliceColor);
    grd.addColorStop(1,   darken(p.sliceColor, 25));

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, rOuter, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();

    angle += slice;
  });

  // ── 2. SEPARADORES METÁLICOS ──────────────────────────
  angle = rotation - Math.PI / 2;
  PRIZES.forEach(p => {
    const slice = (p.weight / totalW) * 2 * Math.PI;
    // linha separadora
    ctx.beginPath();
    ctx.moveTo(cx + rInner * Math.cos(angle), cy + rInner * Math.sin(angle));
    ctx.lineTo(cx + rOuter * Math.cos(angle), cy + rOuter * Math.sin(angle));
    ctx.strokeStyle = 'rgba(200,160,0,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // pino metálico no separador (a ~80% do raio)
    const pinR = rOuter * 0.82;
    const px2 = cx + pinR * Math.cos(angle);
    const py2 = cy + pinR * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(px2, py2, size * 0.012, 0, 2 * Math.PI);
    const pinGrd = ctx.createRadialGradient(px2 - size*0.004, py2 - size*0.004, 0, px2, py2, size*0.012);
    pinGrd.addColorStop(0, '#fff');
    pinGrd.addColorStop(0.4, '#FFE566');
    pinGrd.addColorStop(1, '#7A6000');
    ctx.fillStyle = pinGrd;
    ctx.fill();
    angle += slice;
  });

  // ── 3. ANEL BRILHANTE INTERNO ─────────────────────────
  ctx.beginPath();
  ctx.arc(cx, cy, rOuter * 0.88, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(200,160,0,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── 4. TEXTO NAS FATIAS ───────────────────────────────
  angle = rotation - Math.PI / 2;
  PRIZES.forEach(p => {
    const slice = (p.weight / totalW) * 2 * Math.PI;
    const mid   = angle + slice / 2;

    ctx.save();
    ctx.translate(cx, cy);
    // Rotacionar para o centro da fatia
    ctx.rotate(mid);
    // Texto vai da direita (borda) para esquerda (centro), ao longo do eixo X
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor = 'rgba(0,0,0,0.95)';
    ctx.shadowBlur = 5;

    const lines = p.name.split('\n');
    const fs = Math.max(8.5, size * 0.031);
    const lh = fs * 1.3;
    ctx.font = `900 ${fs}px Nunito, sans-serif`;
    ctx.fillStyle = '#fff';

    // Posição X = distância do centro onde o texto aparece (ao longo do raio)
    const textDist = rOuter * 0.62;
    const totalTextH = (lines.length - 1) * lh;

    lines.forEach((line, li) => {
      const offsetY = -totalTextH / 2 + li * lh;
      ctx.fillText(line, textDist, offsetY);
    });

    ctx.restore();
    angle += slice;
  });

  // ── 5. ANEL EXTERNO DOURADO ───────────────────────────
  // Anel de fundo
  ctx.beginPath();
  ctx.arc(cx, cy, rOuter, 0, 2 * Math.PI);
  const rimGrd = ctx.createLinearGradient(0, 0, size, size);
  rimGrd.addColorStop(0, '#FFE566');
  rimGrd.addColorStop(0.5, '#C8A000');
  rimGrd.addColorStop(1, '#FFE566');
  ctx.strokeStyle = rimGrd;
  ctx.lineWidth = 5;
  ctx.stroke();

  // Bolinhas decorativas no aro
  const nBalls = 24;
  for (let i = 0; i < nBalls; i++) {
    const a  = (i / nBalls) * 2 * Math.PI;
    const br = rOuter - 3;
    const bx = cx + br * Math.cos(a);
    const by = cy + br * Math.sin(a);
    ctx.beginPath();
    ctx.arc(bx, by, size * 0.016, 0, 2 * Math.PI);
    const bg = ctx.createRadialGradient(bx - size*0.005, by - size*0.005, 0, bx, by, size*0.016);
    bg.addColorStop(0, '#fff');
    bg.addColorStop(0.4, '#FFE566');
    bg.addColorStop(1, '#7A6000');
    ctx.fillStyle = bg;
    ctx.fill();
  }
}

// Helpers de cor para gradiente das fatias
function lighten(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (n>>16) + Math.round(2.55*pct));
  const g = Math.min(255, ((n>>8)&0xff) + Math.round(2.55*pct));
  const b = Math.min(255, (n&0xff) + Math.round(2.55*pct));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (n>>16) - Math.round(2.55*pct));
  const g = Math.max(0, ((n>>8)&0xff) - Math.round(2.55*pct));
  const b = Math.max(0, (n&0xff) - Math.round(2.55*pct));
  return `rgb(${r},${g},${b})`;
}

let currentRotation = 0;
drawWheel(0);
window.addEventListener('resize', () => drawWheel(currentRotation));

// ════════════════════════════════════════════════════════
//  GIRO
// ════════════════════════════════════════════════════════
let spinning    = false;
let spinsLeft   = CONFIG.girosPerDia;
let activePrize = null;

async function spinWheel() {
  if (spinning || spinsLeft <= 0) return;
  const uid = UserControl.getCurrentUserId();
  if (await UserControl.hasSpunToday(uid)) { alert('Você já rodou hoje! Volte amanhã.'); return; }

  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const totalW = PRIZES.reduce((s, p) => s + p.weight, 0);
  let rand = Math.random() * totalW, chosen = 0;
  for (let i = 0; i < PRIZES.length; i++) { rand -= PRIZES[i].weight; if (rand <= 0) { chosen = i; break; } }
  activePrize = PRIZES[chosen];

  let startAngle = -Math.PI / 2;
  for (let i = 0; i < chosen; i++) startAngle += (PRIZES[i].weight / totalW) * 2 * Math.PI;
  const sliceAng = (PRIZES[chosen].weight / totalW) * 2 * Math.PI;
  const midAngle = startAngle + sliceAng / 2;
  const needed   = -midAngle - Math.PI / 2;
  const spins    = 6 + Math.floor(Math.random() * 3);
  const target   = currentRotation + spins * 2 * Math.PI + needed - (currentRotation % (2 * Math.PI));
  const t0 = performance.now(), dur = CONFIG.spinDuration, startRot = currentRotation;

  requestAnimationFrame(function animate(now) {
    const prog = Math.min((now - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - prog, 4);
    currentRotation = startRot + (target - startRot) * ease;
    drawWheel(currentRotation);
    if (prog < 1) { requestAnimationFrame(animate); return; }
    spinning  = false;
    spinsLeft = Math.max(0, spinsLeft - 1);
    document.getElementById('spinsCount').textContent = spinsLeft;
    if (spinsLeft === 0) document.getElementById('spinBtn').textContent = 'VOLTE AMANHÃ';
    else document.getElementById('spinBtn').disabled = false;
    UserControl.saveSpinRecord(uid, activePrize);
    showResult(activePrize);
  });
}

function showResult(prize) {
  const tag = document.getElementById('modalTag');
  tag.style.display = prize.tag ? 'inline-block' : 'none';
  if (prize.tag) { tag.style.background = prize.tagColor; tag.textContent = prize.tag; }
  document.getElementById('modalIcon').textContent   = prize.icon;
  document.getElementById('modalTitle').textContent  = prize.win ? 'PARABÉNS!' : 'NÃO GANHOU';
  document.getElementById('modalTitle').className    = 'modal-title ' + (prize.win ? 'win' : 'lose');
  document.getElementById('modalPrize').textContent  = prize.label;
  document.getElementById('modalDetail').textContent = prize.detail;
  document.getElementById('modalBtn').textContent    = prize.ctaLabel;
  document.getElementById('modal').classList.add('show');
  if (prize.win) launchConfetti();
}

function handleModalCta() { if (activePrize?.ctaAction) activePrize.ctaAction(); else closeModal(); }

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('confetti').innerHTML = '';
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  const colors = ['#1565C0','#1976D2','#42A5F5','#90CAF9','#BBDEFB','#ffffff','#64B5F6'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 9;
    el.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.8+Math.random()*1.6}s;animation-delay:${Math.random()*.8}s;transform:rotate(${Math.random()*360}deg);`;
    c.appendChild(el);
  }
  setTimeout(() => c.innerHTML = '', 4000);
}
</script>
